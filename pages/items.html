<!DOCTYPE html>
<!--
    Prim kalemleri yönetim ekranının yapısını içerir.

    Sayfanın görevleri:
    - Yeni prim kalemi ekleme ve mevcut kalemleri düzenleme formunu sunar.
    - Birim ücret, aktiflik durumu ve silme işlemleri için liste alanını barındırır.
-->
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prim Hesaplama Aracı | Prim Kalemleri</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-icon">₺</span>
                <div>
                    <h1>Prim Aracı</h1>
                    <p>Prim Hesaplama Aracı</p>
                </div>
            </div>
            <nav class="side-nav" aria-label="Ana menü"></nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2>Prim Kalemleri</h2>
                    <p>Satış, montaj, servis gibi prim kalemlerini ve birim ücretlerini yönet.</p>
                </div>
            </header>

            <section class="content-card">
                <form id="itemForm" class="form-card inline-form">
                    <label>
                        Kalem Adı
                        <input type="text" id="itemName" placeholder="Örn: Satış" required>
                    </label>

                    <label>
                        Birim Ücret
                        <input type="number" id="unitPrice" min="0" step="0.01" placeholder="Örn: 10" required>
                    </label>

                    <button class="btn btn-primary" type="submit">Kalem Ekle</button>
                </form>
            </section>

            <section class="content-card">
                <div class="section-title">
                    <h3>Kayıtlı Kalemler</h3>
                </div>
                <div id="itemsList" class="list-area empty-state">
                    Henüz prim kalemi eklenmedi.
                </div>
            </section>
        </main>
    </div>

    <nav class="bottom-nav" aria-label="Mobil menü"></nav>

    <script type="module" src="../assets/js/app-init.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
    <script type="module" src="../assets/js/items.js"></script>
</body>
</html>
